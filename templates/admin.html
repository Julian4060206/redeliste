<!DOCTYPE html>
<html lang="de">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Admin - {{ title }}</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/Sortable/1.15.0/Sortable.min.js"></script>
    <script>tailwind.config = { darkMode: 'media' }</script>
</head>
<body class="bg-gray-100 dark:bg-gray-900 text-gray-900 dark:text-gray-100 p-4 font-sans max-w-lg mx-auto transition-colors duration-300 flex flex-col min-h-screen">
    
    <main class="flex-grow">
        <h1 class="text-2xl font-bold text-center mb-6 text-red-600 dark:text-red-400">Admin: {{ title }}</h1>

        <div id="loginSection" class="bg-white dark:bg-gray-800 p-4 rounded-xl shadow-md mb-6 transition-colors">
            <input type="password" id="pwInput" placeholder="Admin Passwort" onkeydown="if(event.key === 'Enter') login()" class="border border-gray-300 dark:border-gray-600 dark:bg-gray-700 dark:text-white p-2 rounded w-full mb-2 outline-none focus:ring focus:ring-red-200">
            <button onclick="login()" class="bg-red-600 text-white w-full px-4 py-2 rounded shadow hover:bg-red-700 transition-colors">Einloggen</button>
        </div>

        <div id="adminSection" class="hidden">
            <div class="bg-white dark:bg-gray-800 p-4 rounded-xl shadow-md mb-6 transition-colors">
                <div class="flex gap-2 mb-4">
                    <input type="text" id="addName" placeholder="Name manuell..." onkeydown="if(event.key === 'Enter') action('add')" class="border border-gray-300 dark:border-gray-600 dark:bg-gray-700 dark:text-white p-2 rounded w-full outline-none focus:ring focus:ring-green-200">
                    <button onclick="action('add')" class="bg-green-600 text-white px-4 py-2 rounded shadow hover:bg-green-700 transition-colors">+</button>
                </div>
                <p class="text-xs text-gray-500 dark:text-gray-400 mb-2">Tipp: Liste greifen und verschieben (Drag & Drop)</p>
                <ul id="adminList" class="space-y-2"></ul>
            </div>
        </div>
    </main>

    <footer class="text-center text-xs text-gray-500 dark:text-gray-400 pt-8 pb-4 mt-auto">
        Made by <a href="https://github.com/Julian4060206" target="_blank" class="text-red-600 dark:text-red-400 hover:underline">Julian</a>
    </footer>

    <script>
        let token = sessionStorage.getItem('adminToken') || '';
        let ws;
        if (token) showAdmin();

        function login() {
            token = document.getElementById('pwInput').value;
            sessionStorage.setItem('adminToken', token);
            showAdmin();
        }

        function showAdmin() {
            document.getElementById('loginSection').classList.add('hidden');
            document.getElementById('adminSection').classList.remove('hidden');
        }

        function connect() {
            ws = new WebSocket(`ws://${location.host}/ws`);
            ws.onmessage = (event) => renderAdminList(JSON.parse(event.data).list);
            ws.onclose = () => setTimeout(connect, 2000);
        }
        connect();

        async function action(type, id = null) {
            const name = type === 'add' ? document.getElementById('addName').value : null;
            let url = `/api/admin/action?action=${type}`;
            if (id) url += `&target_id=${id}`;
            if (name) url += `&new_name=${encodeURIComponent(name)}`;
            
            const res = await fetch(url, { method: 'POST', headers: { 'X-Admin-Token': token } });
            if (res.status === 401) { alert("Falsches Passwort!"); sessionStorage.removeItem('adminToken'); location.reload(); }
            if (type === 'add') document.getElementById('addName').value = '';
        }

        async function saveOrder() {
            const order = Array.from(document.getElementById('adminList').children).map(li => parseInt(li.dataset.id));
            await fetch(`/api/admin/action?action=reorder`, {
                method: 'POST', headers: { 'Content-Type': 'application/json', 'X-Admin-Token': token },
                body: JSON.stringify(order)
            });
        }

        function renderAdminList(list) {
            const container = document.getElementById('adminList');
            container.innerHTML = list.map(p => `
                <li data-id="${p.id}" class="p-3 rounded-lg border flex justify-between items-center cursor-move transition-colors ${p.active ? 'bg-red-100 border-red-400 dark:bg-red-900 dark:border-red-600' : 'bg-gray-50 dark:bg-gray-700 border-gray-200 dark:border-gray-600'}">
                    <span class="font-semibold select-none">☰ ${p.name}</span>
                    <div class="flex gap-2">
                        <button onclick="action('activate', ${p.id})" class="text-sm bg-blue-500 text-white px-3 py-1 rounded shadow hover:bg-blue-600">Aufrufen</button>
                        <button onclick="action('remove', ${p.id})" class="text-sm bg-gray-500 text-white px-3 py-1 rounded shadow hover:bg-gray-600">X</button>
                    </div>
                </li>
            `).join('');
            
            new Sortable(container, { animation: 150, onEnd: saveOrder });
        }
    </script>
</body>
</html>
