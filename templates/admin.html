<!DOCTYPE html>
<html lang="de">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Admin - {{ title }}</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/Sortable/1.15.0/Sortable.min.js"></script>
    <script>tailwind.config = { darkMode: 'media' }</script>
</head>
<body class="bg-gray-100 dark:bg-gray-900 text-gray-900 dark:text-gray-100 p-4 font-sans max-w-lg mx-auto transition-colors duration-300 flex flex-col min-h-screen">
    
    <main class="flex-grow">
        <h1 class="text-2xl font-bold text-center mb-6 text-red-600 dark:text-red-400">Admin: {{ title }}</h1>

        <div id="loginSection" class="bg-white dark:bg-gray-800 p-4 rounded-xl shadow-md mb-6 transition-colors">
            <input type="password" id="pwInput" placeholder="Admin Passwort" 
                   onkeydown="if(event.key === 'Enter') login()" 
                   class="border border-gray-300 dark:border-gray-600 dark:bg-gray-700 dark:text-white p-2 rounded w-full mb-2 outline-none focus:ring focus:ring-red-200">
            <button onclick="login()" class="bg-red-600 text-white w-full px-4 py-2 rounded shadow hover:bg-red-700 transition-colors">Einloggen</button>
        </div>

        <div id="adminSection" class="hidden">
            <div class="bg-white dark:bg-gray-800 p-4 rounded-xl shadow-md mb-6 transition-colors">
                
                <div class="flex gap-2 mb-4">
                    <input type="text" id="addName" placeholder="Name eingeben" 
                    onkeydown="if(event.key === 'Enter'){ event.preventDefault(); action('add'); }"
                    class="flex-grow min-w-0 border border-gray-300 dark:border-gray-600 dark:bg-gray-700 dark:text-white p-2 rounded outline-none focus:ring focus:ring-red-200">
                    <button onclick="action('add')" class="shrink-0 whitespace-nowrap bg-green-600 text-white px-4 py-2 rounded shadow hover:bg-green-700 transition-colors">Hinzufügen</button>
                </div>                
                <p class="text-xs text-gray-500 dark:text-gray-400 mb-2">Tipp: Liste greifen und verschieben (Drag & Drop)</p>
                
                <ul id="adminList" class="space-y-2"></ul>

                <div class="mt-6 pt-4 border-t border-gray-200 dark:border-gray-700 flex flex-col gap-2">
                    
                    <button id="freezeBtn" onclick="action('toggle_freeze')" class="w-full bg-orange-100 text-orange-700 dark:bg-orange-900/50 dark:text-orange-300 px-4 py-2 rounded shadow hover:bg-orange-200 transition-colors border border-orange-300 dark:border-orange-700">
                        🔒 Liste sperren (Freeze)
                    </button>
                    
                    <button onclick="clearList()" class="w-full bg-red-100 text-red-600 dark:bg-red-900/50 dark:text-red-300 px-4 py-2 rounded shadow hover:bg-red-200 dark:hover:bg-red-800 transition-colors border border-red-300 dark:border-red-700">
                        🗑️ Gesamte Liste leeren
                    </button>
                </div>

            </div>
        </div>
    </main>

    <footer class="text-center text-xs text-gray-500 dark:text-gray-400 pt-8 pb-4 mt-auto">
        Made by <a href="https://github.com/Julian4060206" target="_blank" class="text-red-600 dark:text-red-400 hover:underline">Julian</a>
    </footer>

    <script>
        // Prüfe, ob in der aktuellen Session schon ein Token (Passwort) hinterlegt wurde.
        let token = sessionStorage.getItem('adminToken') || '';
        let ws;
        let sortableInstance = null; // Merkt sich die aktuelle Drag&Drop-Instanz

        // Auto-Login, falls das Token noch da ist. Überspringt den Login-Screen.
        if (token) {
            document.getElementById('loginSection').classList.add('hidden');
            document.getElementById('adminSection').classList.remove('hidden');
            connect();
        }

        async function login() {
            const inputToken = document.getElementById('pwInput').value;
            if (!inputToken) return;
            
            // Server-Validierung des Passworts via Ping-Request (verhindert "faulen Login")
            const res = await fetch(`/api/admin/action?action=ping`, { 
                method: 'POST', headers: { 'X-Admin-Token': inputToken } 
            });

            if (res.status === 401) {
                alert("Falsches Passwort!");
                document.getElementById('pwInput').value = '';
            } else {
                // Passwort ist korrekt: Speichern, UI umschalten und WebSocket starten
                token = inputToken;
                sessionStorage.setItem('adminToken', token);
                document.getElementById('pwInput').value = '';
                document.getElementById('loginSection').classList.add('hidden');
                document.getElementById('adminSection').classList.remove('hidden');
                connect();
            }
        }

        function connect() {
            // Automatische Erkennung, ob wir sicheres (wss) oder unsicheres (ws) WebSocket brauchen (wichtig für Tailscale Funnel)
            const protocol = location.protocol === 'https:' ? 'wss:' : 'ws:';
            ws = new WebSocket(`${protocol}//${location.host}/ws`);
            
            // Bei jeder neuen Nachricht vom Server wird die Liste und der Freeze-Status geupdatet
            ws.onmessage = (event) => {
                const data = JSON.parse(event.data);
                renderAdminList(data.list);
                updateFreezeUI(data.is_frozen);
            };
            
            // Auto-Reconnect, falls die Verbindung (z.B. bei Handy-Sperre) abbricht
            ws.onclose = () => setTimeout(connect, 2000);
        }

        function updateFreezeUI(isFrozen) {
            // Passt den Button visuell an den aktuellen Server-Zustand an
            const btn = document.getElementById('freezeBtn');
            if (isFrozen) {
                btn.innerHTML = '🔓 Liste entsperren';
                btn.className = 'w-full bg-green-100 text-green-700 dark:bg-green-900/50 dark:text-green-300 px-4 py-2 rounded shadow hover:bg-green-200 transition-colors border border-green-300 dark:border-green-700';
            } else {
                btn.innerHTML = '🔒 Liste sperren (Freeze)';
                btn.className = 'w-full bg-orange-100 text-orange-700 dark:bg-orange-900/50 dark:text-orange-300 px-4 py-2 rounded shadow hover:bg-orange-200 transition-colors border border-orange-300 dark:border-orange-700';
            }
        }

        async function action(type, id = null) {
            // Zentraler Dispatcher für alle Admin-Interaktionen (Aufrufen, Kicken, Freeze, etc.)
            const nameInput = document.getElementById('addName');
            const name = type === 'add' ? nameInput.value.trim() : null;
            
            // Verhindert das Hinzufügen von leeren Strings
            if (type === 'add' && !name) return; 

            // API URL bauen
            let url = `/api/admin/action?action=${type}`;
            if (id) url += `&target_id=${id}`;
            if (name) url += `&new_name=${encodeURIComponent(name)}`;
            
            const res = await fetch(url, { method: 'POST', headers: { 'X-Admin-Token': token } });
            
            // Falls das Passwort in der Zwischenzeit ungültig wurde oder der Server resettet ist
            if (res.status === 401) { 
                alert("Sitzung abgelaufen oder Passwort falsch!"); 
                sessionStorage.removeItem('adminToken'); 
                location.reload(); 
                return;
            }
            
            // Inputfeld aufräumen nach erfolgreichem Hinzufügen
            if (type === 'add') nameInput.value = ''; 
        }

        async function clearList() {
            // Guard-Clause, damit die Liste nicht aus Versehen gelöscht wird
            if (!confirm("Möchtest du wirklich die gesamte Redeliste leeren?")) return;
            action('clear');
        }

        async function saveOrder() {
            // Wird von SortableJS aufgerufen, wenn Drag&Drop beendet wurde.
            // Holt sich die IDs aller Listenelemente in der neuen Reihenfolge und pusht das Array an den Server.
            const order = Array.from(document.getElementById('adminList').children).map(li => parseInt(li.dataset.id));
            await fetch(`/api/admin/action?action=reorder`, {
                method: 'POST', headers: { 'Content-Type': 'application/json', 'X-Admin-Token': token },
                body: JSON.stringify(order)
            });
        }

        function renderAdminList(list) {
            const container = document.getElementById('adminList');
            
            // Generiert das HTML für die Liste...
            container.innerHTML = list.map(p => `
                <li data-id="${p.id}" class="p-3 rounded-lg border flex flex-wrap sm:flex-nowrap justify-between items-center transition-colors gap-2 ${p.active ? 'bg-red-100 border-red-400 dark:bg-red-900 dark:border-red-600' : (p.is_go ? 'bg-amber-50 border-amber-300 dark:bg-amber-900/20 dark:border-amber-700' : 'bg-gray-50 dark:bg-gray-700 border-gray-200 dark:border-gray-600')}">
                    <div class="font-semibold select-none flex items-center flex-grow min-w-0">
                        <span class="drag-handle cursor-move mr-3 text-gray-400 text-xl px-2 py-1 bg-gray-200 dark:bg-gray-600 rounded active:bg-gray-300">☰</span>
                        <span class="truncate">${p.name}</span> 
                        ${p.is_go ? '<span class="text-[10px] bg-amber-500 text-white px-2 py-0.5 rounded ml-2 shrink-0">GO</span>' : ''}
                    </div>
                    <div class="flex gap-2 shrink-0">
                        <button onclick="action('activate', ${p.id})" class="text-sm bg-blue-500 text-white px-4 py-2 rounded shadow hover:bg-blue-600">Aufrufen</button>
                        <button onclick="action('remove', ${p.id})" class="text-sm bg-gray-500 text-white px-4 py-2 rounded shadow hover:bg-gray-600">X</button>
                    </div>
                </li>
            `).join('');
            
            // NEU: Räumt den alten Drag&Drop-Geist auf, falls es einen gibt!
            if (sortableInstance) {
                sortableInstance.destroy();
            }
            
            // Speichert die neue Instanz in der Variablen
            sortableInstance = new Sortable(container, { 
                animation: 150, 
                handle: '.drag-handle',
                delay: 150,             
                delayOnTouchOnly: true, 
                onEnd: saveOrder 
            });
        }

    </script>
</body>
</html>
