<!DOCTYPE html>
<html lang="de">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>{{ title }}</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script>tailwind.config = { darkMode: 'media' }</script>
</head>
<body class="bg-gray-100 dark:bg-gray-900 text-gray-900 dark:text-gray-100 p-4 font-sans antialiased max-w-md mx-auto transition-colors duration-300 flex flex-col min-h-screen">
    
    <main class="flex-grow">
        <h1 class="text-2xl font-bold text-center mb-6 text-blue-600 dark:text-blue-400">{{ title }}</h1>
        
        <div id="loginSection" class="bg-white dark:bg-gray-800 p-4 rounded-xl shadow-md mb-6 transition-colors">
            <input type="password" id="pwInput" placeholder="Passwort" 
                   onkeydown="if(event.key === 'Enter') login()" 
                   class="border border-gray-300 dark:border-gray-600 dark:bg-gray-700 dark:text-white p-2 rounded w-full mb-2 outline-none focus:ring focus:ring-blue-200">
            <button onclick="login()" class="bg-blue-600 text-white w-full px-4 py-2 rounded shadow hover:bg-blue-700 transition-colors">Einloggen</button>
        </div>

        <div id="mainSection" class="hidden">
            <div class="bg-white dark:bg-gray-800 p-4 rounded-xl shadow-md mb-6 transition-colors duration-300 flex flex-col gap-4">
                <h2 class="text-lg font-semibold" id="actionTitle">Aktionen</h2>
                
                <input type="text" id="nameInput" placeholder="Dein Name..." class="border border-gray-300 dark:border-gray-600 dark:bg-gray-700 dark:text-white p-2 rounded w-full focus:ring focus:ring-blue-200 dark:focus:ring-blue-800 outline-none transition-colors">

                <div class="p-3 bg-gray-50 dark:bg-gray-700/50 rounded-lg border border-gray-200 dark:border-gray-600 flex flex-col gap-2">
                    <h3 class="text-sm font-semibold text-gray-700 dark:text-gray-300">Reguläre Wortmeldung</h3>
                    <button id="btnNormal" onclick="joinList(false)" class="w-full bg-blue-600 text-white px-4 py-2 rounded shadow hover:bg-blue-700 transition-colors">Melden</button>
                    <button id="leaveNormalBtn" onclick="leaveList(false)" class="hidden w-full bg-red-500 text-white px-4 py-2 rounded shadow hover:bg-red-600 transition-colors">Wortmeldung zurückziehen</button>
                    <div id="frozenMessage" class="hidden text-center text-sm text-orange-600 dark:text-orange-400 font-bold py-1 bg-orange-100 dark:bg-orange-900/30 rounded">🔒 Die Liste ist geschlossen.</div>
                </div>

                <div class="p-3 bg-amber-50 dark:bg-amber-900/10 rounded-lg border border-amber-200 dark:border-amber-700/50 flex flex-col gap-2">
                    <h3 class="text-sm font-semibold text-amber-800 dark:text-amber-400">Geschäftsordnungsantrag (GO)</h3>
                    <button id="btnGO" onclick="joinList(true)" class="w-full bg-amber-500 text-white px-4 py-2 rounded shadow hover:bg-amber-600 transition-colors font-semibold">GO-Antrag stellen</button>
                    <button id="leaveGoBtn" onclick="leaveList(true)" class="hidden w-full bg-red-500 text-white px-4 py-2 rounded shadow hover:bg-red-600 transition-colors">GO-Antrag zurückziehen</button>
                    <p id="goHint" class="text-xs text-amber-700/70 dark:text-amber-500/70 text-center">Wird priorisiert behandelt. Auch bei gesperrter Liste möglich.</p>
                </div>
            </div>

            <div class="bg-white dark:bg-gray-800 p-4 rounded-xl shadow-md transition-colors duration-300">
                <h2 class="text-lg font-semibold mb-3">Aktuelle Redeliste</h2>
                <ul id="listContainer" class="space-y-2"></ul>
            </div>
        </div>
    </main>

    <footer class="text-center text-xs text-gray-500 dark:text-gray-400 pt-8 pb-4 mt-auto">
        Made by <a href="https://github.com/Julian4060206" target="_blank" class="text-blue-600 dark:text-blue-400 hover:underline">Julian</a>
    </footer>

    <script>
        let myNormalId = sessionStorage.getItem('myNormalId') ? parseInt(sessionStorage.getItem('myNormalId')) : null;
        let myGoId = sessionStorage.getItem('myGoId') ? parseInt(sessionStorage.getItem('myGoId')) : null;
        let mySavedName = sessionStorage.getItem('myName') || ''; 
        let userToken = sessionStorage.getItem('userToken') || ''; // Das gespeicherte Anwender-Passwort
        
        let currentList = [];
        let isFrozen = false;
        let ws;

        // Auto-Login, falls das Passwort in dieser Session schon eingegeben wurde
        if (userToken) {
            document.getElementById('loginSection').classList.add('hidden');
            document.getElementById('mainSection').classList.remove('hidden');
            connect();
        }

        async function login() {
            const inputToken = document.getElementById('pwInput').value;
            if (!inputToken) return;
            
            // Server fragen, ob das Passwort stimmt
            const res = await fetch(`/api/user/ping`, { 
                method: 'POST', headers: { 'X-User-Token': inputToken } 
            });

            if (res.status === 401) {
                alert("Falsches Passwort!");
                document.getElementById('pwInput').value = '';
            } else {
                userToken = inputToken;
                sessionStorage.setItem('userToken', userToken);
                document.getElementById('pwInput').value = '';
                document.getElementById('loginSection').classList.add('hidden');
                document.getElementById('mainSection').classList.remove('hidden');
                connect();
            }
        }

        function connect() {
            const protocol = location.protocol === 'https:' ? 'wss:' : 'ws:';
            ws = new WebSocket(`${protocol}//${location.host}/ws`);
            
            ws.onmessage = (event) => {
                const data = JSON.parse(event.data);
                currentList = data.list;
                isFrozen = data.is_frozen;
                renderList(currentList);
            };
            
            ws.onclose = () => setTimeout(connect, 2000);
        }

        function updateUI(list) {
            if (myNormalId && !list.some(p => p.id === myNormalId)) {
                myNormalId = null; sessionStorage.removeItem('myNormalId');
            }
            if (myGoId && !list.some(p => p.id === myGoId)) {
                myGoId = null; sessionStorage.removeItem('myGoId');
            }

            const nameInput = document.getElementById('nameInput');
            if (!nameInput.value && mySavedName) nameInput.value = mySavedName;

            if (myNormalId) {
                document.getElementById('btnNormal').classList.add('hidden');
                document.getElementById('frozenMessage').classList.add('hidden');
                document.getElementById('leaveNormalBtn').classList.remove('hidden');
            } else {
                document.getElementById('leaveNormalBtn').classList.add('hidden');
                if (isFrozen) {
                    document.getElementById('btnNormal').classList.add('hidden');
                    document.getElementById('frozenMessage').classList.remove('hidden');
                } else {
                    document.getElementById('btnNormal').classList.remove('hidden');
                    document.getElementById('frozenMessage').classList.add('hidden');
                }
            }

            if (myGoId) {
                document.getElementById('btnGO').classList.add('hidden');
                document.getElementById('leaveGoBtn').classList.remove('hidden');
            } else {
                document.getElementById('btnGO').classList.remove('hidden');
                document.getElementById('leaveGoBtn').classList.add('hidden');
            }

            if ((myNormalId && myGoId) || (isFrozen && myGoId)) {
                nameInput.classList.add('hidden');
            } else {
                nameInput.classList.remove('hidden');
            }
        }

        async function joinList(isGo) {
            const nameInput = document.getElementById('nameInput');
            const btn = isGo ? document.getElementById('btnGO') : document.getElementById('btnNormal');
            
            if (!nameInput.value.trim()) return;
            
            mySavedName = nameInput.value.trim();
            sessionStorage.setItem('myName', mySavedName);
            
            nameInput.disabled = true;
            btn.disabled = true;
            
            try {
                const res = await fetch('/api/join', {
                    method: 'POST', 
                    headers: { 'Content-Type': 'application/json', 'X-User-Token': userToken },
                    body: JSON.stringify({ name: mySavedName, is_go: isGo })
                });
                
                // Falls das Passwort zwischendurch vom Admin geändert wurde
                if (res.status === 401) {
                    alert("Sitzung abgelaufen oder Passwort falsch!");
                    sessionStorage.removeItem('userToken');
                    location.reload();
                    return;
                }

                if (res.status === 403) {
                    alert("Die Liste wurde gerade vom Admin gesperrt.");
                    return;
                }
                
                const data = await res.json();
                
                if (isGo) {
                    myGoId = data.id;
                    sessionStorage.setItem('myGoId', myGoId);
                } else {
                    myNormalId = data.id;
                    sessionStorage.setItem('myNormalId', myNormalId);
                }
                
                renderList(currentList); 
            } finally {
                nameInput.disabled = false;
                btn.disabled = false;
            }
        }

        async function leaveList(isGo) {
            let tempId = isGo ? myGoId : myNormalId;
            if (!tempId) return;
            
            if (isGo) {
                myGoId = null;
                sessionStorage.removeItem('myGoId');
            } else {
                myNormalId = null;
                sessionStorage.removeItem('myNormalId');
            }
            
            renderList(currentList);
            
            const res = await fetch('/api/leave', {
                method: 'POST', 
                headers: { 'Content-Type': 'application/json', 'X-User-Token': userToken },
                body: JSON.stringify({ id: tempId })
            });

            // Falls das Passwort zwischendurch vom Admin geändert wurde
            if (res.status === 401) {
                alert("Sitzung abgelaufen oder Passwort falsch!");
                sessionStorage.removeItem('userToken');
                location.reload();
            }
        }

        function renderList(list) {
            updateUI(list);
            const container = document.getElementById('listContainer');
            
            if (list.length === 0) {
                container.innerHTML = '<li class="text-gray-500 dark:text-gray-400 text-center py-4">Die Liste ist leer.</li>';
                return;
            }
            
            container.innerHTML = list.map((p, index) => {
                const isMe = (p.id === myNormalId) || (p.id === myGoId);
                const activeClasses = p.active 
                    ? 'bg-blue-100 border-blue-400 dark:bg-blue-900 dark:border-blue-600 font-bold' 
                    : (p.is_go ? 'bg-amber-50 border-amber-300 dark:bg-amber-900/20 dark:border-amber-700' : 'bg-gray-50 border-gray-200 dark:bg-gray-700 dark:border-gray-600');
                const meRing = isMe ? 'ring-2 ring-green-400 dark:ring-green-500' : '';
                const goBadge = p.is_go ? '<span class="text-[10px] font-bold bg-amber-500 text-white px-2 py-0.5 rounded shadow ml-2">GO</span>' : '';
                
                return `
                <li class="p-3 rounded-lg border flex justify-between items-center transition-colors ${activeClasses} ${meRing}">
                    <span><span class="text-gray-400 dark:text-gray-400 mr-2">${index + 1}.</span> ${p.name} ${goBadge} <span class="text-sm text-gray-500 dark:text-gray-300">${isMe ? '(Du)' : ''}</span></span>
                    ${p.active ? '<span class="text-xs bg-blue-500 text-white px-2 py-1 rounded-full animate-pulse shadow">Spricht</span>' : ''}
                </li>`;
            }).join('');
        }
    </script>
</body>
</html>
